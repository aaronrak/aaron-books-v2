<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Télécharger les fichiers du projet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,1);
            padding: 48px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .icon {
            width: 64px;
            height: 64px;
            background: #d1fae5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon svg {
            width: 32px;
            height: 32px;
            color: #065f46;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }
        p {
            color: #64748b;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #065f46;
            color: white;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            transition: background 0.2s;
            width: 100%;
            justify-content: center;
        }
        .download-btn:hover {
            background: #047857;
        }
        .download-btn svg {
            width: 20px;
            height: 20px;
        }
        .size {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 12px;
        }
        .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            margin-top: 24px;
            transition: color 0.2s;
        }
        .back:hover {
            color: #334155;
        }
        .back svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 1 002 2h10a2 2 0 002-2V8m-9 4h4" />
            </svg>
        </div>
        <h1>Fichiers du projet</h1>
        <p>Téléchargez l'archive ZIP contenant tous les fichiers source du projet.</p>
        
        <a href="/project-files.zip" download="project-files.zip" class="download-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Télécharger le ZIP
        </a>
        
        <p class="size">Taille: ~150 Ko</p>
        
        <a href="/" class="back">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Retour a l'accueil
        </a>
    </div>
</body>
</html>
